spring:
  datasource:
    url: jdbc:h2:mem:hackton;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

app:
  jwt:
    secret: hackton-sus-test-secret-key-with-at-least-256-bits-value
    expiration-minutes: 60
